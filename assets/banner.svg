<svg width="1280" height="400" viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="60%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#1e293b" stroke-width="0.6"/>
    </pattern>
    <radialGradient id="logoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f95232" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f95232" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rightGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M 0 0.5 L 6 3.5 L 0 6.5 Z" fill="#f95232" opacity="0.85"/>
    </marker>
    <filter id="softShadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="url(#bg)"/>
  <rect width="1280" height="400" fill="url(#grid)" opacity="0.45"/>

  <!-- Glow orbs -->
  <ellipse cx="185" cy="200" rx="220" ry="220" fill="url(#logoGlow)"/>
  <ellipse cx="1050" cy="200" rx="300" ry="220" fill="url(#rightGlow)"/>

  <!-- Vertical divider -->
  <line x1="490" y1="36" x2="490" y2="364" stroke="#1e293b" stroke-width="1"/>

  <!-- ===================== LEFT: BRANDING ===================== -->

  <!-- Logo box -->
  <rect x="78" y="154" width="82" height="82" rx="18" fill="#e63419" filter="url(#softShadow)"/>
  <!-- Logo inner highlight -->
  <rect x="78" y="154" width="82" height="38" rx="18" fill="#f95232" opacity="0.35"/>
  <!-- C letter -->
  <text x="119" y="208" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="44" font-weight="800" fill="white" text-anchor="middle" dominant-baseline="auto">C</text>

  <!-- DOMglyph title -->
  <text x="182" y="202" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="52" font-weight="800" fill="#f8fafc" letter-spacing="-1.5">DOMglyph</text>

  <!-- Subtitle -->
  <text x="184" y="228" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" fill="#94a3b8" font-weight="400" letter-spacing="0.3">AI-native design system</text>

  <!-- Separator -->
  <line x1="184" y1="246" x2="456" y2="246" stroke="#1e293b" stroke-width="1"/>

  <!-- Tagline lines -->
  <text x="184" y="272" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#475569">Built for humans.</text>
  <text x="184" y="293" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#475569">Operable by AI agents.</text>

  <!-- Feature pills -->
  <rect x="184" y="314" width="86" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="227" y="329" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#64748b" text-anchor="middle">React</text>

  <rect x="278" y="314" width="108" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="332" y="329" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#64748b" text-anchor="middle">TypeScript</text>

  <rect x="394" y="314" width="72" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="430" y="329" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#64748b" text-anchor="middle">MIT</text>

  <!-- ===================== RIGHT: DUAL-LAYER VIZ ===================== -->

  <!-- Section header label -->
  <text x="877" y="50" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#334155" font-weight="600" letter-spacing="2.5" text-anchor="middle">DUAL-LAYER ARCHITECTURE</text>

  <!-- ---- CARD 1: VISUAL LAYER ---- -->
  <rect x="512" y="62" width="316" height="276" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1" filter="url(#softShadow)"/>

  <!-- Card 1 title bar -->
  <rect x="512" y="62" width="316" height="42" rx="12" fill="#1e293b"/>
  <rect x="512" y="88" width="316" height="16" fill="#1e293b"/>
  <!-- Traffic lights -->
  <circle cx="537" cy="83" r="5" fill="#ef4444" opacity="0.75"/>
  <circle cx="556" cy="83" r="5" fill="#f59e0b" opacity="0.75"/>
  <circle cx="575" cy="83" r="5" fill="#22c55e" opacity="0.75"/>
  <text x="670" y="88" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#64748b" font-weight="600" letter-spacing="1.5" text-anchor="middle">VISUAL LAYER</text>

  <!-- Input field -->
  <rect x="534" y="116" width="272" height="38" rx="7" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="550" y="139" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#475569">Search users...</text>
  <circle cx="792" cy="135" r="7" fill="none" stroke="#475569" stroke-width="1.5"/>
  <line x1="797" y1="140" x2="802" y2="145" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Primary CTA button -->
  <rect x="534" y="168" width="272" height="42" rx="8" fill="#e63419"/>
  <text x="670" y="194" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Save Profile</text>

  <!-- Secondary button row -->
  <rect x="534" y="224" width="128" height="33" rx="7" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="598" y="245" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Cancel</text>
  <rect x="674" y="224" width="132" height="33" rx="7" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="740" y="245" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#64748b" text-anchor="middle">+ Add Field</text>

  <!-- Status badge -->
  <rect x="534" y="272" width="94" height="24" rx="12" fill="#052e16" stroke="#166534" stroke-width="1"/>
  <circle cx="551" cy="284" r="4" fill="#22c55e"/>
  <text x="561" y="288" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#86efac">Active</text>

  <!-- ---- CONNECTING ARROW ---- -->
  <line x1="832" y1="200" x2="857" y2="200" stroke="#f95232" stroke-width="1.5" marker-end="url(#arr)" opacity="0.8"/>

  <!-- ---- CARD 2: SEMANTIC LAYER ---- -->
  <rect x="862" y="62" width="392" height="276" rx="12" fill="#020617" stroke="#1e3a2f" stroke-width="1" filter="url(#softShadow)"/>

  <!-- Card 2 title bar -->
  <rect x="862" y="62" width="392" height="42" rx="12" fill="#0a1f12"/>
  <rect x="862" y="88" width="392" height="16" fill="#0a1f12"/>
  <text x="1058" y="88" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#22c55e" font-weight="600" letter-spacing="1.5" text-anchor="middle">SEMANTIC LAYER</text>

  <!-- Code: opening tag -->
  <text x="882" y="124" font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="12.5">
    <tspan fill="#64748b">&lt;</tspan><tspan fill="#f97316">button</tspan>
  </text>

  <!-- Line: data-ai-id -->
  <text x="898" y="142" font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="12.5">
    <tspan fill="#7dd3fc">data-ai-id</tspan><tspan fill="#475569">=</tspan><tspan fill="#22c55e">"save-profile"</tspan>
  </text>

  <!-- Line: data-ai-role -->
  <text x="898" y="160" font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="12.5">
    <tspan fill="#7dd3fc">data-ai-role</tspan><tspan fill="#475569">=</tspan><tspan fill="#f97316">"action"</tspan>
  </text>

  <!-- Line: data-ai-action -->
  <text x="898" y="178" font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="12.5">
    <tspan fill="#7dd3fc">data-ai-action</tspan><tspan fill="#475569">=</tspan><tspan fill="#22c55e">"save-profile"</tspan>
  </text>

  <!-- Line: data-ai-state -->
  <text x="898" y="196" font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="12.5">
    <tspan fill="#7dd3fc">data-ai-state</tspan><tspan fill="#475569">=</tspan><tspan fill="#60a5fa">"idle"</tspan>
  </text>

  <!-- Closing > -->
  <text x="882" y="214" font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="12.5" fill="#64748b">&gt;</text>

  <!-- Separator line -->
  <line x1="882" y1="226" x2="1234" y2="226" stroke="#1e293b" stroke-width="1"/>

  <!-- API comment -->
  <text x="882" y="244" font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="11.5" fill="#475569">// window.__CORTEX_UI__.getAvailableActions()</text>

  <!-- API result block -->
  <rect x="882" y="252" width="352" height="72" rx="7" fill="#020f0a" stroke="#1e3a2f" stroke-width="1"/>
  <text x="898" y="270" font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="11">
    <tspan fill="#475569">[{ id: </tspan><tspan fill="#22c55e">"save-profile"</tspan><tspan fill="#475569">,</tspan>
  </text>
  <text x="898" y="287" font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="11">
    <tspan fill="#475569">   role: </tspan><tspan fill="#f97316">"action"</tspan><tspan fill="#475569">, state: </tspan><tspan fill="#60a5fa">"idle"</tspan><tspan fill="#475569">,</tspan>
  </text>
  <text x="898" y="304" font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="11">
    <tspan fill="#475569">   section: </tspan><tspan fill="#22c55e">"profile-form"</tspan><tspan fill="#475569"> }]</tspan>
  </text>
</svg>
